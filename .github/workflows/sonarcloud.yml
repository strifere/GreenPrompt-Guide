name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

env:
  DATABASE_URL: postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}?schema=public

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: greenprompt-guide

      - name: Generate Prisma client
        run: npm run prisma:generate
        working-directory: greenprompt-guide

      - name: Run tests with coverage
        run: npm run test -- --coverage
        working-directory: greenprompt-guide

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}